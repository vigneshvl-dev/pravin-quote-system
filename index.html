<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pravin's Kitchen — Login / Role Selection</title>
    <style>
        :root {
            --bg: #0b1a10;
            --surface: #122417;
            --surface2: #1b3523;
            --border: #23452e;
            --accent: #3dbb6e;
            --accent-dark: #2a9055;
            --text: #d4edd9;
            --muted: #7aaa87;
            --danger: #e05c5c;
            --good: #2ecc71;
            --radius: 12px;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: var(--sans);
            color: var(--text);
            background: var(--bg);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient background decoration */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            top: -100px;
            left: -100px;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            bottom: -150px;
            right: -150px;
            pointer-events: none;
        }

        .login-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            z-index: 10;
        }

        .brand-logo {
            width: 120px;
            height: 120px;
            border-radius: 12px;
            margin: 0 auto 15px;
            display: block;
            object-fit: contain;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .brand-header h1 {
            font-size: 2.2rem;
            margin: 0;
            letter-spacing: 0.5px;
            color: var(--text);
        }

        .brand-header h1 span {
            color: var(--accent);
        }

        .brand-header p {
            margin: 8px 0 0 0;
            color: var(--muted);
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            gap: 20px;
            backdrop-filter: blur(10px);
        }

        .card-title {
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 5px;
        }

        .role-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 16px 20px;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .role-btn:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
            background: rgba(61, 187, 110, 0.05);
            box-shadow: 0 4px 15px rgba(61, 187, 110, 0.15);
        }

        .role-btn.admin-btn:hover {
            border-color: var(--accent);
        }

        .role-btn .arrow {
            font-size: 1.2rem;
            color: var(--accent);
            transition: transform 0.25s;
        }

        .role-btn:hover .arrow {
            transform: translateX(4px);
        }

        .role-desc {
            font-size: 0.8rem;
            font-weight: 400;
            color: var(--muted);
            display: block;
            margin-top: 4px;
            text-align: left;
        }

        /* Modal styling */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 12px;
            color: var(--accent);
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .modal-body label {
            display: block;
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .modal-body input {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 12px;
            border-radius: 6px;
            width: 100%;
            font-size: 0.95rem;
        }

        .modal-body input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .modal-btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
        }

        .modal-btn.cancel {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .modal-btn.cancel:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .modal-btn.confirm {
            background: var(--accent);
            color: var(--bg);
        }

        .modal-btn.confirm:hover {
            background: var(--accent-dark);
        }

        .error-msg {
            color: var(--danger);
            font-size: 0.8rem;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="brand-header">
            <img src="logo.png" alt="Pravin's Kitchen Logo" class="brand-logo">
            <h1>Pravin<span>'s</span> Kitchen</h1>
            <p>Modular Quote System</p>
        </div>

        <div class="card">
            <div class="card-title">Select Portal to Continue</div>
            <!-- Admin Panel Button -->
            <button class="role-btn admin-btn" onclick="openAdminModal()">
                <div>
                    <span>Admin Dashboard</span>
                </div>
                <span class="arrow">→</span>
            </button>

            <!-- Employee Panel Button -->
            <button class="role-btn" onclick="goEmployee()">
                <div>
                    <span>Employee Portal</span>
                </div>
                <span class="arrow">→</span>
            </button>
        </div>
    </div>

    <!-- Admin Password Modal -->
    <div class="modal-overlay" id="adminModal">
        <div class="modal">
            <h3 class="modal-title">Admin Access Required</h3>
            <div class="modal-body">
                <label for="adminPass">Enter Passcode</label>
                <input type="password" id="adminPass" placeholder="••••••••" onkeydown="handleKeyDown(event)">
                <div class="error-msg" id="errorMsg">Incorrect passcode. Try again.</div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeAdminModal()">Cancel</button>
                <button class="modal-btn confirm" onclick="verifyAdmin()">Login</button>
            </div>
        </div>
    </div>
    <script>
        // Set default passcode in localStorage if not exists or is still default
        if (!localStorage.getItem('pks_admin_pass') || localStorage.getItem('pks_admin_pass') === 'admin123') {
            localStorage.setItem('pks_admin_pass', 'pravin');
        }

        function openAdminModal() {
            document.getElementById('adminModal').classList.add('active');
            document.getElementById('adminPass').focus();
            document.getElementById('errorMsg').style.display = 'none';
        }

        function closeAdminModal() {
            document.getElementById('adminModal').classList.remove('active');
            document.getElementById('adminPass').value = '';
        }

        function goEmployee() {
            sessionStorage.setItem('pks_role', 'employee');
            location.href = 'rooms.html';
        }

        function verifyAdmin() {
            const entered = document.getElementById('adminPass').value;
            const correct = localStorage.getItem('pks_admin_pass');

            if (entered === correct) {
                sessionStorage.setItem('pks_admin_auth', 'true');
                sessionStorage.setItem('pks_role', 'admin');
                location.href = 'rooms.html';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('adminPass').select();
            }
        }
        function handleKeyDown(event) {
            if (event.key === 'Enter') {
                verifyAdmin();
            }
        }
    </script>
</body>

</html>
