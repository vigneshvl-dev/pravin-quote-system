<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pravin's Kitchen — Select Division</title>
    <style>
        :root {
            --bg: #0b1a10;
            --surface: #122417;
            --surface2: #1b3523;
            --border: #23452e;
            --accent: #3dbb6e;
            --accent-dark: #2a9055;
            --text: #d4edd9;
            --muted: #7aaa87;
            --danger: #e05c5c;
            --radius: 12px;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--sans);
            color: var(--text);
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: 00;
            padding: 16px 24px;
            border-bottom: 4px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 14px rgba(0, 0, 0, .3);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        header img {
            height: 46px;
            border-radius: 6px;
            object-fit: contain;
        }

        header h1 {
            font-size: 1.35rem;
            color: var(--text);
        }

        header h1 span {
            color: var(--accent);
        }

        .role-badge {
            background: var(--border);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--accent);
            margin-left: 10px;
            vertical-align: middle;
        }

        .logout-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        main {
            flex: 1;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            padding: 36px 24px 60px;
        }

        .page-title {
            text-align: center;
            margin-bottom: 36px;
        }

        .page-title h2 {
            font-size: 1.8rem;
            color: var(--text);
            margin-bottom: 8px;
        }

        .page-title p {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 320px));
            gap: 20px;
            justify-content: center;
        }

        .room-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 22px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            position: relative;
            overflow: hidden;
            margin-top: 254px;

        }

        .room-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--accent);
            transform: scaleX(0);
            transition: transform 0.25s ease;
            transform-origin: left;
        }

        .room-card:hover {
            border-color: var(--accent);
            background: var(--surface2);
            transform: translateY(-4px);
            box-shadow: 0 10px 24px rgba(61, 187, 110, 0.12);
        }

        .room-card:hover::before {
            transform: scaleX(1);
        }

        .room-icon {
            font-size: 2.2rem;
            line-height: 1;
        }

        .room-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
        }

        .room-sub {
            font-size: 0.8rem;
            color: var(--muted);
        }

        .room-arrow {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.4rem;
            color: var(--accent);
            opacity: 0;
            transition: opacity 0.2s, right 0.2s;
        }

        .room-card:hover .room-arrow {
            opacity: 1;
            right: 14px;
        }

        .room-card.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .coming-soon {
            font-size: 0.68rem;
            font-weight: 700;
            color: var(--muted);
            background: var(--border);
            border-radius: 4px;
            padding: 2px 7px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-top: 2px;
        }

        /* Clean wrapping and centering handled by auto-fit grid */
    </style>
</head>

<body>

    <header>
        <div class="header-left">
            <img src="logo.png" alt="Pravin's Kitchen Logo">
            <div>
                <h1>Pravin<span>'s</span> Kitchen <span class="role-badge" id="roleBadge">Loading...</span></h1>
                <div
                    style="font-size:0.75rem; color:var(--muted); margin-top:2px; text-transform:uppercase; letter-spacing:1.5px;">
                    Select Division</div>
            </div>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </header>

    <main>
        <div class="page-title">
            <h2>Which division are you working on?</h2>
            <p id="subtitleText">Select a division to continue</p>
        </div>

        <div class="rooms-grid" id="roomsGrid"></div>
    </main>

    <script>
        const DEFAULT_DIVISIONS = [
            { id: 'marketing', name: 'Marketing', icon: '📈', sub: 'Marketing division quotes', active: true },
            { id: 'showroom', name: 'Showroom', icon: '🏢', sub: 'Showroom display & walk-in quotes', active: true }
        ];

        function getDivisions() {
            const stored = localStorage.getItem('pks_divisions');
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    if (Array.isArray(parsed)) return parsed;
                } catch(e) {
                    console.error("Error parsing divisions, using defaults", e);
                }
            }
            localStorage.setItem('pks_divisions', JSON.stringify(DEFAULT_DIVISIONS));
            return DEFAULT_DIVISIONS;
        }

        const DIVISIONS = getDivisions();

        // Determine role from sessionStorage
        const role = sessionStorage.getItem('pks_role');

        // If no role set, go back to login
        if (!role) {
            location.href = 'index.html';
        }

        document.getElementById('roleBadge').textContent = role === 'admin' ? 'Admin' : 'Employee';
        document.getElementById('subtitleText').textContent = role === 'admin'
            ? 'Select a division to manage rates and items'
            : 'Select a division to start building a quote';

        const grid = document.getElementById('roomsGrid');

        DIVISIONS.forEach(div => {
            const card = document.createElement('div');
            card.className = 'room-card' + (div.active ? '' : ' disabled');
            card.innerHTML = `
                <div class="room-icon">${div.icon}</div>
                <div class="room-name">${div.name}</div>
                <div class="room-sub">${div.sub}</div>
                ${!div.active ? '<span class="coming-soon">Coming Soon</span>' : '<span class="room-arrow">→</span>'}
            `;
            if (div.active) {
                card.onclick = () => selectDivision(div.id, div.name);
            }
            grid.appendChild(card);
        });

        function selectDivision(divId, divName) {
            sessionStorage.setItem('pks_selected_division', divId);
            sessionStorage.setItem('pks_selected_division_name', divName);

            // Set default room and room name so subsequent pages load correctly
            sessionStorage.setItem('pks_selected_room', 'kitchen');
            sessionStorage.setItem('pks_selected_room_name', 'Kitchen');

            if (role === 'admin') {
                location.href = 'admin.html';
            } else {
                location.href = 'employee.html';
            }
        }

        function logout() {
            sessionStorage.clear();
            location.href = 'index.html';
        }
    </script>
</body>

</html>
